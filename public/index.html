<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Destemidos</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XpWRf9pj/logo.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Destemidos">
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --sat: env(safe-area-inset-top);
        }

        html, body {
            margin: 0;
            padding: 0;
            /* Impede que o scroll "pule" ou mostre fundo cinza */
            background-color: #ffffff; 
            height: 100%;
        }

        #root {
            /* Adiciona o espaço do notch de forma fixa no topo */
            margin-top: var(--sat);
            min-height: calc(100vh - var(--sat));
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
