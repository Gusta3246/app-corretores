<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Destemidos</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    
    <link rel="manifest" href="/manifest.json" />

    <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)" href="/splash_screens/iPhone_17_Pro_Max__iPhone_16_Pro_Max_landscape.png">
    <link rel="apple-touch-startup-image" media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash_screens/iPhone_17_Pro__iPhone_17__iPhone_16_Pro_portrait.png">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Destemidos">
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --topo-seguro: calc(env(safe-area-inset-top) + 12px);
        }
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overscroll-behavior-y: none;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--topo-seguro);
            background-color: #ffffff; 
            z-index: 9998;
        }
        #root {
            padding-top: var(--topo-seguro);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
        }

        /* Animações Suaves */
        #install-popup {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #install-overlay {
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <div id="install-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[9999] hidden opacity-0"></div>

    <div id="install-popup" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[88%] max-w-[360px] bg-white p-8 rounded-[3.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] z-[10000] hidden flex-col items-center text-center transform scale-90 opacity-0">
        
        <div class="mb-6">
            <img src="https://i.postimg.cc/XpWRf9pj/logo.png" class="w-24 h-24 object-contain" alt="Logo">
        </div>

        <div class="mb-8 px-2">
            <h4 class="text-[22px] font-bold text-slate-900 leading-tight">Instalar Destemidos</h4>
            <p id="install-text" class="text-[15px] text-slate-500 mt-3 leading-relaxed">
                Adicione à tela inicial para ter acesso rápido e uma experiência fluida em tela cheia.
            </p>
        </div>

        <div class="w-full flex flex-col items-center">
            <button id="install-button" class="w-full bg-black text-white font-bold py-4 rounded-2xl text-base transition-transform active:scale-95 shadow-lg shadow-black/20">
                Instalar agora
            </button>
            <button id="close-popup" class="mt-4 text-slate-400 font-semibold text-sm hover:text-slate-600 transition-colors">
                Agora não
            </button>
        </div>
    </div>

    <script>
        const popup = document.getElementById('install-popup');
        const overlay = document.getElementById('install-overlay');
        const btnInstalar = document.getElementById('install-button');
        const btnFechar = document.getElementById('close-popup');
        const txtInstalar = document.getElementById('install-text');
        let deferredPrompt;

        const isStandalone = () => {
            return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        };

        const wasDismissed = () => {
            const dismissedAt = localStorage.getItem('pwa_dismissed_at');
            if (!dismissedAt) return false;
            const hours = (Date.now() - parseInt(dismissedAt)) / (1000 * 60 * 60);
            return hours < 48;
        };

        function showPopup() {
            if (isStandalone() || wasDismissed()) return;
            
            overlay.classList.remove('hidden');
            popup.classList.remove('hidden');
            
            setTimeout(() => {
                overlay.classList.add('opacity-100');
                popup.classList.add('opacity-100', 'scale-100');
            }, 50);
        }

        function hidePopup() {
            overlay.classList.remove('opacity-100');
            popup.classList.remove('opacity-100', 'scale-100');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                popup.classList.add('hidden');
            }, 500);
        }

        // Android / Windows
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showPopup();
        });

        // iOS Safari (iPhone)
        const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        if (isIos && !isStandalone()) {
            txtInstalar.innerHTML = "Toque no ícone de <b>compartilhar</b> <span class='text-xl'>⎋</span> e selecione <br><b>'Adicionar à Tela de Início'</b>.";
            btnInstalar.innerText = "Entendi";
            setTimeout(showPopup, 2000); 
        }

        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') hidePopup();
                deferredPrompt = null;
            } else {
                hidePopup();
            }
        });

        btnFechar.onclick = () => {
            localStorage.setItem('pwa_dismissed_at', Date.now().toString());
            hidePopup();
        };

        overlay.onclick = hidePopup;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
            });
        }
    </script>
</body>
</html>
