<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Destemidos</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XpWRf9pj/logo.png" />

    <link rel="apple-touch-startup-image" href="https://i.postimg.cc/XpWRf9pj/logo.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Destemidos">
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Definimos uma variável para o tamanho do notch + um extra de 12px */
        :root {
            --topo-seguro: calc(env(safe-area-inset-top) + 12px);
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overscroll-behavior-y: none;
        }

        /* A "capa" do topo agora é um pouco maior que o notch */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--topo-seguro);
            background-color: #ffffff; 
            z-index: 9999;
        }

        #root {
            /* Empurra o conteúdo para baixo usando a mesma medida */
            padding-top: var(--topo-seguro);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
