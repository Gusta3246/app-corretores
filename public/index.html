    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --topo-seguro: 0px;
            --notch-bg: #ffffff;
        }
        /* Somente iOS standalone: ativa safe area */
        html.ios-standalone {
            --topo-seguro: env(safe-area-inset-top);
        }
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overscroll-behavior-y: none;
        }
        /* Barra do notch: SOMENTE iOS standalone */
        html.ios-standalone body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--topo-seguro);
            background-color: var(--notch-bg);
            z-index: 9999;
            transition: background-color 0.5s ease;
        }
        #root {
            padding-top: var(--topo-seguro);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
        }
        #install-popup {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #install-overlay {
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <div id="install-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[10000] hidden opacity-0"></div>

    <div id="install-popup" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[88%] max-w-sm bg-white p-8 rounded-[2.5rem] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.4)] z-[10001] hidden flex-col items-center text-center transform scale-90 opacity-0">
        
        <div class="mb-6">
            <img src="https://i.postimg.cc/XpWRf9pj/logo.png" class="w-20 h-20 object-contain mx-auto" alt="Destemidos">
        </div>

        <div class="mb-8">
            <h4 class="text-2xl font-black text-gray-900 leading-tight tracking-tight">Instalar Destemidos</h4>
            <p id="install-text" class="text-[15px] text-gray-500 mt-3 leading-relaxed px-1">
                Adicione à tela inicial para ter acesso rápido e uma experiência fluida em tela cheia.
            </p>
        </div>

        <div class="w-full flex flex-col gap-3">
            <button id="install-button" class="w-full bg-black text-white font-bold py-4 rounded-2xl text-base transition-transform active:scale-95 shadow-lg">
                Instalar agora
            </button>
            <button id="close-popup" class="w-full py-2 text-gray-400 font-semibold text-sm hover:text-gray-600 transition-colors">
                Agora não
            </button>
        </div>
    </div>

    <script>
        const popup = document.getElementById('install-popup');
        const overlay = document.getElementById('install-overlay');
        const btnInstalar = document.getElementById('install-button');
        const btnFechar = document.getElementById('close-popup');
        const txtInstalar = document.getElementById('install-text');
        let deferredPrompt;

        const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        // --- FUNÇÕES DE SENSORIAL (SOM E VIBRAÇÃO) ---
        function playSuccessSensorial() {
            // 1. Vibração Leve e Dupla (Estilo Apple Pay)
            if ('vibrate' in navigator) {
                navigator.vibrate([40, 40, 40]); // Vibra, pausa, vibra
            }

            // 2. Som Suave "Hello" (Frequências harmônicas)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const playNote = (freq, startTime, duration, volume) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine'; // Onda senoidal (suave)
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(volume, startTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };

                const now = audioCtx.currentTime;
                playNote(523.25, now, 0.15, 0.1);      // Nota Dó (C5) - Suave
                playNote(659.25, now + 0.08, 0.2, 0.08); // Nota Mi (E5) - Um pouco mais alta, criando o "Hello"
            } catch (e) {
                console.log("AudioContext não suportado");
            }
        }

        function showPopup() {
            if (isStandalone() || localStorage.getItem('pwa_hide_prompt')) return;
            overlay.classList.remove('hidden');
            popup.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('opacity-100');
                popup.classList.add('opacity-100', 'scale-100');
                popup.classList.remove('scale-90');
            }, 50);
        }

        function hidePopup() {
            overlay.classList.remove('opacity-100');
            popup.classList.remove('opacity-100', 'scale-100');
            popup.classList.add('scale-90');
            setTimeout(() => {
                overlay.classList.add('hidden');
                popup.classList.add('hidden');
            }, 500);
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showPopup();
        });

        // === DETECÇÃO iOS + CONTROLE DA BARRA DO NOTCH ===
        const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());

        // Ativa classe ios-standalone SOMENTE no iOS em modo PWA
        if (isIos && isStandalone()) {
            document.documentElement.classList.add('ios-standalone');
        }

        // Função global chamada pelo React quando o usuário muda o tema
        window.setNotchTheme = function(dark) {
            const bg = dark ? '#0F172A' : '#ffffff';
            const themeColor = dark ? '#0F172A' : '#ffffff';
            document.documentElement.style.setProperty('--notch-bg', bg);
            document.documentElement.style.setProperty('--topo-seguro', 'env(safe-area-inset-top)');
            const meta = document.getElementById('theme-color-meta');
            if (meta) meta.setAttribute('content', themeColor);
        };

        if (isIos && !isStandalone()) {
            txtInstalar.innerHTML = "Toque no ícone de <b>compartilhar</b> <span class='text-xl'>⎋</span> e depois em <b>'Adicionar à Tela de Início'</b>.";
            btnInstalar.innerText = "Entendi";
            setTimeout(showPopup, 3000); 
        }

        btnInstalar.onclick = async () => {
            // Dispara o efeito sensorial
            playSuccessSensorial();

            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') hidePopup();
                deferredPrompt = null;
            } else {
                hidePopup();
            }
        };

        btnFechar.onclick = () => {
            localStorage.setItem('pwa_hide_prompt', 'true');
            hidePopup();
        };

        overlay.onclick = hidePopup;
    </script>
