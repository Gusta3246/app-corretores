<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Destemidos</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XpWRf9pj/logo.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Destemidos">
    
    <meta name="mobile-web-app-capable" content="yes" />
    
    <meta name="theme-color" content="#ffffff" id="theme-meta" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --topo-seguro: calc(env(safe-area-inset-top) + 12px);
            --bg-app: #ffffff; /* Cor padrão (clara) */
        }

        /* Quando o seu app React adicionar a classe 'dark' ao HTML ou Body */
        .dark, [data-theme='dark'] {
            --bg-app: #000000; /* Cor do modo noturno */
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-app);
            overscroll-behavior-y: none;
            transition: background-color 0.3s ease;
        }

        /* A barra de proteção agora segue a variável de cor */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--topo-seguro);
            background-color: var(--bg-app); 
            z-index: 9999;
            transition: background-color 0.3s ease;
        }

        #root {
            padding-top: var(--topo-seguro);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
            background-color: var(--bg-app);
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
