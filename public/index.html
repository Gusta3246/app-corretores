<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Destemidos</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XpWRf9pj/logo.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Destemidos">
    
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            /* Notch + respiro que você gostou */
            --topo-seguro: calc(env(safe-area-inset-top) + 12px);
            --bg-barra: #ffffff;
        }

        /* Detecta Modo Escuro do Sistema ou Classe .dark do Tailwind */
        @media (prefers-color-scheme: dark) {
            :root { --bg-barra: #0f172a; } /* Cor azul escura do seu print */
        }

        /* Se o seu JS adiciona a classe .dark no html, isso reforça a cor */
        html.dark :root {
            --bg-barra: #0f172a;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-barra);
            overscroll-behavior-y: none;
        }

        /* A "capa" do topo que protege o notch */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--topo-seguro);
            background-color: var(--bg-barra);
            z-index: 9999;
            pointer-events: none;
        }

        #root {
            padding-top: var(--topo-seguro);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
            background-color: var(--bg-barra);
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
