<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Destemidos</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XpWRf9pj/logo.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Destemidos">
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Cor de fundo que preencherá a área da barra inferior */
            height: 100%;
        }

        #root {
            /* 1. Resolve o Notch: Empurra o conteúdo para baixo no topo */
            padding-top: env(safe-area-inset-top);
            
            /* 2. Resolve a Barra Inferior: Garante que o conteúdo chegue até o final, 
               mas com um respiro para a barrinha do iOS não cobrir botões importantes */
            padding-bottom: env(safe-area-inset-bottom);
            
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Isso impede que o topo "vaze" cores estranhas ao puxar para baixo */
        @media screen and (display-mode: standalone) {
            header, .seu-topo-fixo {
                position: sticky;
                top: 0;
                z-index: 50;
                background-color: #ffffff;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
