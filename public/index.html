<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Destemidos</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/XpWRf9pj/logo.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XpWRf9pj/logo.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Destemidos">
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            /* Remove o scroll elástico do topo que causa o glitch visual */
            overscroll-behavior-y: none;
        }

        /* BARRA DE SEGURANÇA DO NOTCH */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: env(safe-area-inset-top);
            background-color: #ffffff; /* Cor de fundo idêntica ao seu cabeçalho */
            z-index: 9999;
        }

        #root {
            /* Empurra o conteúdo fixamente abaixo da barra que criamos acima */
            padding-top: env(safe-area-inset-top);
            /* Mantém a barra inferior limpa e preenchida */
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
